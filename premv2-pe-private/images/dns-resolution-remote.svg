<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f7a1f"/>
    </marker>
    <marker id="arrPL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a2a82"/>
    </marker>
  </defs>

  <text x="460" y="28" text-anchor="middle" font-size="18" font-weight="700">Remote path — resolves to Private Endpoint NIC (10.10.2.4)</text>

  <!-- Remote VNet -->
  <rect x="20" y="60" width="380" height="450" rx="10" fill="#E8F1F9" stroke="#3a6ea5" stroke-width="2"/>
  <text x="35" y="82" font-weight="700" fill="#234c75">remote-callers-vnet  (10.20.0.0/16)</text>
  <text x="35" y="100" fill="#234c75" font-size="11">Private DNS zone "demos.srinman.com" (remote-callers-rg) linked here</text>

  <rect x="40" y="120" width="190" height="100" rx="6" fill="#fff" stroke="#3a6ea5"/>
  <text x="50" y="140" font-weight="600">aca-subnet (10.20.4.0/23)</text>
  <rect x="55" y="150" width="160" height="55" rx="4" fill="#dbe9f5" stroke="#234c75"/>
  <text x="135" y="172" text-anchor="middle" font-weight="700">shell-remote</text>
  <text x="135" y="190" text-anchor="middle" font-size="11">curl https://apimprivate.demos.srinman.com</text>

  <text x="40" y="265" font-weight="700" fill="#234c75">Resolution sequence</text>
  <text x="40" y="288" font-size="12">①  App resolves apimprivate.demos.srinman.com</text>
  <text x="40" y="308" font-size="12">②  Query goes to Azure DNS 168.63.129.16</text>
  <text x="40" y="328" font-size="12">③  Azure DNS checks zones linked to THIS VNet</text>
  <text x="40" y="348" font-size="12">④  Returns A → 10.10.2.4 (from remote-callers-rg zone)</text>
  <text x="40" y="368" font-size="12">⑤  TCP 443 → 10.10.2.4 over VNet peering</text>
  <text x="40" y="388" font-size="12">⑥  PE NIC tunnels via PrivateLink to APIM service</text>
  <text x="40" y="408" font-size="12">⑦  APIM serves TLS cert + responds (HTTP 200)</text>
  <text x="40" y="436" font-size="11" fill="#0d4a0d" font-weight="600">No hop into apim-vnet's routing/UDR/NVA chain.</text>
  <text x="40" y="452" font-size="11" fill="#0d4a0d" font-weight="600">PE = a NIC in a subnet you already reach via peering.</text>

  <!-- Azure DNS -->
  <rect x="450" y="100" width="200" height="90" rx="8" fill="#FFF2E0" stroke="#c87f12" stroke-width="2"/>
  <text x="550" y="122" text-anchor="middle" font-weight="700" fill="#7a4a00">Azure-provided DNS</text>
  <text x="550" y="142" text-anchor="middle" font-size="12">168.63.129.16</text>
  <text x="550" y="160" text-anchor="middle" font-size="11">Same VIP — different answer</text>
  <text x="550" y="178" text-anchor="middle" font-size="11">based on caller VNet's links</text>

  <!-- Zone -->
  <rect x="700" y="100" width="200" height="120" rx="8" fill="#FFE9C7" stroke="#c87f12"/>
  <text x="800" y="122" text-anchor="middle" font-weight="700" fill="#7a4a00">Private DNS zone</text>
  <text x="800" y="140" text-anchor="middle" font-size="11">demos.srinman.com</text>
  <text x="800" y="156" text-anchor="middle" font-size="11">RG = remote-callers-rg</text>
  <text x="800" y="172" text-anchor="middle" font-size="10" fill="#7a4a00">(same NAME, different RESOURCE)</text>
  <line x1="715" y1="180" x2="885" y2="180" stroke="#c87f12"/>
  <text x="800" y="198" text-anchor="middle" font-size="11" font-weight="600">A apimprivate</text>
  <text x="800" y="214" text-anchor="middle" font-size="11">→ 10.10.2.4</text>

  <!-- Peering -->
  <rect x="450" y="240" width="200" height="40" rx="6" fill="#dfe7f0" stroke="#3a6ea5" stroke-dasharray="4 3"/>
  <text x="550" y="265" text-anchor="middle" font-size="11" font-weight="600" fill="#234c75">VNet peering · system route</text>

  <!-- APIM VNet -->
  <rect x="450" y="300" width="450" height="210" rx="10" fill="#F6EEFB" stroke="#5a2a82" stroke-width="2"/>
  <text x="465" y="322" font-weight="700" fill="#4a1d6a">apim-vnet-cus (10.10.0.0/16) — peered</text>

  <!-- PE subnet -->
  <rect x="470" y="340" width="200" height="80" rx="6" fill="#fff" stroke="#5a2a82"/>
  <text x="480" y="358" font-weight="600">pe-subnet (10.10.2.0/24)</text>
  <rect x="485" y="365" width="170" height="48" rx="4" fill="#E5F5E5" stroke="#1f7a1f"/>
  <text x="570" y="383" text-anchor="middle" font-weight="700">Private Endpoint NIC</text>
  <text x="570" y="400" text-anchor="middle" font-size="11">10.10.2.4 · groupId=Gateway</text>

  <!-- APIM subnet -->
  <rect x="700" y="340" width="190" height="80" rx="6" fill="#fff" stroke="#5a2a82"/>
  <text x="710" y="358" font-weight="600">apim-subnet (10.10.1.0/24)</text>
  <rect x="715" y="365" width="160" height="48" rx="4" fill="#efe5f7" stroke="#5a2a82"/>
  <text x="795" y="383" text-anchor="middle" font-weight="700">APIM injected NIC</text>
  <text x="795" y="400" text-anchor="middle" font-size="11">10.10.1.4 (NOT used on this path)</text>

  <!-- PrivateLink arrow PE -> APIM service -->
  <path d="M655 388 L715 388" fill="none" stroke="#5a2a82" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrPL)"/>
  <text x="660" y="435" font-size="11" fill="#5a2a82" font-weight="600">PrivateLink service connection</text>
  <text x="660" y="450" font-size="11" fill="#5a2a82">(Microsoft backbone — not an IP hop)</text>

  <!-- Arrows -->
  <!-- client query -->
  <path d="M225 175 Q 330 90 450 145" fill="none" stroke="#444" stroke-width="1.6" marker-end="url(#arr2)"/>
  <text x="290" y="100" font-size="11" fill="#444">① query</text>

  <!-- DNS -> zone -->
  <path d="M650 145 L700 145" fill="none" stroke="#444" stroke-width="1.6" marker-end="url(#arr2)"/>
  <text x="660" y="138" font-size="11" fill="#444">③ lookup</text>

  <!-- zone -> DNS return -->
  <path d="M700 175 L650 175" fill="none" stroke="#444" stroke-width="1.6" marker-end="url(#arr2)"/>
  <text x="660" y="192" font-size="11" fill="#444">A record</text>

  <!-- DNS -> client answer -->
  <path d="M450 180 Q 330 250 225 205" fill="none" stroke="#444" stroke-width="1.6" marker-end="url(#arr2)"/>
  <text x="290" y="240" font-size="11" fill="#444">④ 10.10.2.4</text>

  <!-- client -> PE (over peering) -->
  <path d="M215 195 Q 280 470 485 388" fill="none" stroke="#1f7a1f" stroke-width="2.2" marker-end="url(#arrB)"/>
  <text x="230" y="490" font-size="11" font-weight="600" fill="#1f7a1f">⑤ TCP 443 over peering</text>
</svg>
